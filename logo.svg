<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#0f0d0a"/>
    </linearGradient>
    <linearGradient id="s" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f5e0b0"/>
      <stop offset="60%" stop-color="#d4a85a"/>
      <stop offset="100%" stop-color="#bf8438"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle top-left sheen -->
  <ellipse cx="180" cy="150" rx="200" ry="140" fill="rgba(212,168,90,0.05)"/>

  <!-- Inner border ring -->
  <rect x="2" y="2" width="508" height="508" rx="107" fill="none"
        stroke="rgba(212,168,90,0.10)" stroke-width="2"/>

  <!--
    S drawn as two stroke arcs — no font dependency.
    Upper bowl: large arc from top-right to mid-left (counter-clockwise).
    Lower bowl: large arc from mid-left to bottom-right (clockwise).
    A short diagonal bridge connects them through the middle.
  -->
  <g stroke="url(#s)" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-width="52">
    <!-- upper bowl -->
    <path d="M 330 162
             C 330 100, 182 88, 166 178
             C 154 238, 256 252, 256 252"/>
    <!-- lower bowl -->
    <path d="M 256 260
             C 256 260, 356 272, 344 340
             C 332 412, 176 412, 174 356"/>
  </g>
</svg>
